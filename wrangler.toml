# MANIT SOLUTIONS Payroll — wrangler.toml
# D1 binding must also be configured in Cloudflare Dashboard:
#   Pages > manitsolutions-website > Settings > Functions > D1 Database Bindings
#   Binding name: DB  →  D1 database: manit-payroll-db (or your database name)

pages_build_output_dir = "."  # static files are in root
pages_build_command = ""       # no build needed for static HTML

[[d1_databases]]
binding = "DB"
database_name = "manit-payroll-db"
database_id = ""  # fill after creating the DB: wrangler d1 create manit-payroll-db

[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "manit-payroll-db"
database_id = ""
